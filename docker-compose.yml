version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fintrack-backend
    expose:
      - "5000"
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/fintrack.db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - NODE_ENV=production
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: fintrack-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
  backend-uploads:
